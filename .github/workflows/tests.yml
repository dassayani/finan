name: Tests

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  tests:
    name: Unit + Integration + UI + Contracts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Run standard test suite
        run: npm run test

  real-db-tests:
    name: Real DB Integration
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: financeflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d financeflow_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DIRECT_URL: postgresql://postgres:postgres@localhost:5432/financeflow_test
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/financeflow_test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/financeflow_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Prepare DB schema
        run: npx prisma db push --skip-generate

      - name: Run real-db tests
        run: npm run test:realdb
